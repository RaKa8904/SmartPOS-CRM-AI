services:
  # Backend Web Service
  - type: web
    name: smartpos-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    rootDir: backend
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: smartpos-db
          property: connectionString
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: JWT_REFRESH_SECRET_KEY
        generateValue: true
      - key: ALLOWED_ORIGINS
        fromService:
          name: smartpos-frontend
          type: web
          property: host

  # Frontend Static Site
  - type: web
    name: smartpos-frontend
    runtime: static
    buildCommand: npm run build
    staticPublishPath: dist
    rootDir: frontend
    envVars:
      - key: VITE_API_URL
        fromService:
          name: smartpos-backend
          type: web
          property: host

databases:
  - name: smartpos-db
    plan: free
